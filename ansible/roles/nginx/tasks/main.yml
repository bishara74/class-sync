# =============================================================================
# Role: nginx — Install Nginx and configure reverse proxy
# =============================================================================

- name: Install Nginx
  ansible.builtin.apt:
    name: nginx
    state: present

- name: Ensure Nginx is started and enabled
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: yes

- name: Deploy ClassSync Nginx configuration
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/classsync
    owner: root
    group: root
    mode: "0644"
  notify: Reload Nginx

- name: Enable ClassSync Nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/classsync
    dest: /etc/nginx/sites-enabled/classsync
    state: link
  notify: Reload Nginx

- name: Remove default Nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload Nginx

handlers:
  - name: Reload Nginx
    ansible.builtin.service:
      name: nginx
      state: reloaded
