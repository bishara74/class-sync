apiVersion: apps/v1
kind: Deployment
metadata:
  name: classsync-backend
  namespace: classsync
  labels:
    app: classsync
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: classsync
      component: backend
  template:
    metadata:
      labels:
        app: classsync
        component: backend
    spec:
      containers:
        - name: classsync-backend
          image: classsync-backend:latest
          imagePullPolicy: IfNotPresent  # Use local image (Minikube)
          ports:
            - containerPort: 8081
              protocol: TCP
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
