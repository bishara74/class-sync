# =============================================================================
# ClassSync — Nginx Reverse Proxy Configuration
#
# Architecture:
#   Internet → Nginx (port 80)
#                ├── /api/*  → Spring Boot (port 8081)
#                └── /*      → Angular static files
#
# Installation:
#   sudo cp /opt/classsync/deployment/ec2/nginx.conf /etc/nginx/sites-available/classsync
#   sudo ln -sf /etc/nginx/sites-available/classsync /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl restart nginx
# =============================================================================

server {
    listen 80;
    listen [::]:80;

    # Replace with your EC2 public IP or domain name
    server_name _;

    # ---------------------------------------------------------
    # Angular static files (SPA)
    # ---------------------------------------------------------
    root /opt/classsync/angular-frontend/dist/angular-frontend/browser;
    index index.html;

    location / {
        # SPA routing — serve index.html for all non-file routes
        try_files $uri $uri/ /index.html;
    }

    # ---------------------------------------------------------
    # API reverse proxy → Spring Boot (port 8081)
    # ---------------------------------------------------------
    location /api/ {
        proxy_pass http://localhost:8081;

        # Pass original client information to the backend
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running requests
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ---------------------------------------------------------
    # Security headers
    # ---------------------------------------------------------
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # ---------------------------------------------------------
    # Logging
    # ---------------------------------------------------------
    access_log /var/log/nginx/classsync_access.log;
    error_log  /var/log/nginx/classsync_error.log;

    # ---------------------------------------------------------
    # SSL with Let's Encrypt (future step)
    #
    # 1. Install certbot:
    #      sudo apt install certbot python3-certbot-nginx
    #
    # 2. Obtain certificate:
    #      sudo certbot --nginx -d yourdomain.com
    #
    # 3. Certbot will automatically modify this config to:
    #      - Listen on port 443 with SSL
    #      - Redirect port 80 → 443
    #      - Add ssl_certificate and ssl_certificate_key paths
    #
    # 4. Auto-renewal is set up by default. Verify with:
    #      sudo certbot renew --dry-run
    # ---------------------------------------------------------
}
